name: 🚀 Feature Request
description: Propor uma nova funcionalidade para o Root-Spector
title: "feat: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Nova Funcionalidade
        Obrigado por contribuir com o Root-Spector! Preencha os campos abaixo para propor uma nova funcionalidade.

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Por que essa funcionalidade é necessária? Qual problema ela resolve?
      placeholder: |
        Descreva o contexto e a motivação para esta funcionalidade.
        Exemplo: "Operador de manufatura precisa visualizar predições de risco em tempo real..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Escopo
      description: O que deve ser implementado?
      placeholder: |
        - Item 1
        - Item 2
        - Item 3
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Critérios de Aceite
      description: Como validar que a funcionalidade está completa?
      placeholder: |
        - [ ] Critério 1
        - [ ] Critério 2
        - [ ] Critério 3
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependências
      description: Esta funcionalidade depende de outras issues?
      placeholder: |
        - #123
        - #456
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: Referências
      description: Links para documentação ou recursos externos
      placeholder: |
        - `specs/product.md`
        - `specs/design.md`
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Categoria
      description: Qual camada do sistema esta funcionalidade afeta?
      options:
        - root_cause_agent - Grafo/Nós (LangGraph)
        - root_cause_agent - Ferramenta/Validação
        - backend - API (FastAPI)
        - frontend - Componentes React
        - config - Regras do setor
        - tests/e2e - Testes automatizados
        - Documentação
        - Outro
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Para qual milestone esta funcionalidade é planejada? (ver docs/gitflow.md)
      options:
        - M1 - Especificação & Arquitetura
        - M2 - Dados & Configuração
        - M3 - Implementação do Agente
        - M4 - Testes & Verificação
        - M5 - Documentação & Entrega
        - Backlog (sem milestone definida)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      description: Qual a prioridade desta funcionalidade?
      options:
        - 🔴 Alta (Bloqueante)
        - 🟡 Média (Importante)
        - 🟢 Baixa (Nice to have)
    validations:
      required: true
