name: CI - Lint & Testes

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    name: Testes do agente + backend (pytest)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -v
        # tests/test_tools.py, tests/test_graph.py, tests/test_config.py
        # (fallback de LLM), tests/test_backend.py (rotas + contrato
        # OpenAPI) -- todos usando tests/fixtures/biotecpredict_teste.db e
        # um LLM fake/determinístico, nunca uma chave real nem
        # data/biotecpredict.db.

  frontend-test:
    runs-on: ubuntu-latest
    name: Testes do frontend (Vitest)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: frontend

      - name: Vitest
        run: npm run test
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    name: E2E (Playwright)
    needs: [test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Instalar dependências (Python)
        run: pip install -e ".[dev]"

      - name: Instalar dependências (frontend)
        run: npm ci
        working-directory: frontend

      - name: Instalar dependências (e2e)
        run: npm ci
        working-directory: tests/e2e

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Rodar suíte E2E
        run: npx playwright test
        working-directory: tests/e2e
        env:
          # backend+frontend sobem via webServer do playwright.config.ts,
          # que já aponta pra fixture de teste e um LLM fake -- nunca
          # contra data/biotecpredict.db nem um provedor real (ver
          # specs/ci-cd.md).
          LLM_PROVIDER: fake

      - name: Publicar relatório do Playwright em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
