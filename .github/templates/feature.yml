name: 🚀 Feature Request
description: Propor uma nova funcionalidade para o BiotecPredict
title: "feat: "
labels: ["feat"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Nova Funcionalidade
        Obrigado por contribuir com o BiotecPredict! Preencha os campos abaixo para propor uma nova funcionalidade.

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Por que essa funcionalidade é necessária? Qual problema ela resolve?
      placeholder: |
        Descreva o contexto e a motivação para esta funcionalidade.
        Exemplo: "Operador de manufatura precisa visualizar predições de risco em tempo real..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Escopo
      description: O que deve ser implementado?
      placeholder: |
        - Item 1
        - Item 2
        - Item 3
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Critérios de Aceite
      description: Como validar que a funcionalidade está completa?
      placeholder: |
        - [ ] Critério 1
        - [ ] Critério 2
        - [ ] Critério 3
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependências
      description: Esta funcionalidade depende de outras issues?
      placeholder: |
        - #123
        - #456
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: Referências
      description: Links para documentação, steering files, ou recursos externos
      placeholder: |
        - `.specs/product.md`
        - `.specs/tech.md`
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Categoria
      description: Qual camada do sistema esta funcionalidade afeta?
      options:
        - Backend - API
        - Backend - Processadores
        - Backend - Machine Learning
        - Backend - Banco de Dados
        - Frontend - Componentes
        - Frontend - Páginas
        - Frontend - Serviços
        - Infraestrutura
        - Documentação
        - Outro
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: Para qual sprint esta funcionalidade é planejada?
      options:
        - Sprint 1 - Setup e Estrutura Base
        - Sprint 2 - Upload e Persistência
        - Sprint 3 - Dashboards e Compliance Score
        - Sprint 4 - Machine Learning e Publicação
        - Backlog (sem sprint definida)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      description: Qual a prioridade desta funcionalidade?
      options:
        - 🔴 Alta (Bloqueante)
        - 🟡 Média (Importante)
        - 🟢 Baixa (Nice to have)
    validations:
      required: true
