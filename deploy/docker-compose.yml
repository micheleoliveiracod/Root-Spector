services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      BIOTECPREDICT_DB_PATH: /app/data/biotecpredict.db
      CHECKPOINT_DB_PATH: /app/data/checkpoints.db
      REPORTS_DIR: /app/reports
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
